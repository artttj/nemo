<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nemo - Authentication</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    .spinner.hidden {
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error {
      color: #ef4444;
      margin-top: 1rem;
    }
    .success {
      color: #22c55e;
      margin-top: 0.5rem;
    }
    .hint {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 1rem;
      line-height: 1.5;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
    }
    .icon svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="spinner" class="spinner"></div>
    <div id="icon" class="icon" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
        <circle cx="12" cy="12" r="10" />
        <path d="M8 12l2.5 2.5L16 9" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <p id="status">Authenticating...</p>
    <p id="error" class="error" style="display:none;"></p>
    <p id="hint" class="hint" style="display:none;"></p>
  </div>
  <script type="module" src="./webauthn.ts"></script>
</body>
</html>
