<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 sm:p-6 font-sans antialiased">

    <!-- Subtle Ambient Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-zinc-900/20 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Main Panel -->
    <div class="w-full max-w-[380px] bg-zinc-950/60 backdrop-blur-md border border-white/10 p-8 sm:p-10 relative shadow-2xl">

        <!-- Header -->
        <header class="mb-10">
            <h1 class="text-sm font-medium text-zinc-500 tracking-wider uppercase mb-1">NEMO</h1>
            <p class="text-2xl font-light text-zinc-100 tracking-tight">Enter your passkey</p>
        </header>

        <!-- Main Content -->
        <main class="flex flex-col gap-6">

            <!-- Password Input -->
            <div class="relative">
                <input
                    type="password"
                    placeholder="Passkey"
                    class="w-full bg-zinc-900/50 border border-white/8 rounded-lg px-4 py-3.5 text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-white/20 focus:bg-zinc-900/80 transition-all duration-300 font-mono text-sm tracking-wide"
                >
                <button class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-600 hover:text-zinc-400 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 5V3M12 21V19M19 12H21M3 12H5M16.95 7.05L18.36 5.64M5.64 18.36L7.05 16.95M16.95 16.95L18.36 18.36M5.64 5.64L7.05 7.05"/>
                    </svg>
                </button>
            </div>

            <!-- Biometric Option -->
            <button class="flex items-center gap-2.5 text-sm text-zinc-500 hover:text-zinc-300 transition-colors duration-200 py-1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="6" width="18" height="12" rx="2"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Use Face ID or Touch ID
            </button>

        </main>

        <!-- Footer -->
        <footer class="mt-10 pt-6 border-t border-white/5">
            <div class="flex items-center justify-between">
                <span class="text-xs text-zinc-700 font-mono">v2.4.7</span>
                <a href="#" class="text-xs text-zinc-600 hover:text-zinc-400 transition-colors">Recover access</a>
            </div>
        </footer>

    </div>

</body>
</html>
