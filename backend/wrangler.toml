# Cloudflare Workers configuration for Nemo Sync
# Deploy: wrangler deploy

name = "nemo-sync"
main = "worker.ts"
compatibility_date = "2024-01-01"

# Free tier: 100k requests/day
# Pro tier: $5/month for 10M requests

[[d1_databases]]
binding = "NEMO_SYNC"
database_name = "nemo_pass_manager_db"
database_id = "52147a7c-8711-466c-9328-a3caac206d13"

# Environment variables (optional)
[vars]
# Set to your extension's origin for production
# ALLOWED_ORIGIN = "chrome-extension://your-extension-id"
ALLOWED_ORIGIN = "*"  # Allow all origins during development

# Rate limiting (built into worker code)
# Max 100 requests per IP per 15 minutes

[build]
command = ""
