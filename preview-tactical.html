<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEMO - Tactical UI Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-void: #0A0A0F;
      --bg-card: #12121A;
      --bg-elevated: #1A1A24;
      --fg-primary: #E0E0E0;
      --fg-secondary: #8A8F98;
      --fg-muted: #4A4F5A;
      --accent-primary: #00FF88;
      --accent-secondary: #00D4FF;
      --accent-warning: #FFB800;
      --accent-destructive: #FF3366;
      --accent-success: #00FF88;
      --border-subtle: rgba(42, 42, 58, 0.6);
      --border-active: rgba(0, 255, 136, 0.5);
      --font-heading: 'Orbitron', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --glow-primary: 0 0 20px rgba(0, 255, 136, 0.3);
      --glow-warning: 0 0 20px rgba(255, 184, 0, 0.3);
      --glow-destructive: 0 0 20px rgba(255, 51, 102, 0.3);
      --scanline-color: rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050508;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      font-family: var(--font-mono);
      padding: 40px;
      flex-wrap: wrap;
    }

    .scanline-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        var(--scanline-color) 2px,
        var(--scanline-color) 4px
      );
      z-index: 9999;
      opacity: 0.5;
    }

    .nemo-popup {
      width: 380px;
      min-height: 500px;
      max-height: 700px;
      background: var(--bg-void);
      color: var(--fg-primary);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .chamfered {
      clip-path: polygon(
        8px 0, calc(100% - 8px) 0,
        100% 8px,
        100% calc(100% - 8px),
        calc(100% - 8px) 100%,
        8px 100%,
        0 calc(100% - 8px),
        0 8px
      );
    }

    .chamfered-sm {
      clip-path: polygon(
        4px 0, calc(100% - 4px) 0,
        100% 4px,
        100% calc(100% - 4px),
        calc(100% - 4px) 100%,
        4px 100%,
        0 calc(100% - 4px),
        0 4px
      );
    }

    .hud-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      position: relative;
    }

    .hud-card::before,
    .hud-card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--fg-muted);
      border-style: solid;
      pointer-events: none;
      transition: border-color 0.15s ease;
    }

    .hud-card::before {
      top: 0;
      left: 0;
      border-width: 1px 0 0 1px;
    }

    .hud-card::after {
      bottom: 0;
      right: 0;
      border-width: 0 1px 1px 0;
    }

    .hud-card:hover::before,
    .hud-card:hover::after {
      border-color: var(--accent-primary);
    }

    .tactical-button {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      color: var(--fg-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 16px;
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tactical-button::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.15s ease;
      pointer-events: none;
    }

    .tactical-button:hover {
      background: rgba(0, 255, 136, 0.08);
      border-color: var(--accent-primary);
    }

    .tactical-button:hover::before {
      border-color: var(--accent-primary);
      inset: -1px;
    }

    .tactical-button:active {
      transform: scale(0.98);
      box-shadow: var(--glow-primary);
    }

    .tactical-button-primary {
      background: var(--accent-primary);
      color: var(--bg-void);
      border-color: var(--accent-primary);
      font-weight: 700;
    }

    .tactical-button-primary:hover {
      background: #00FF88;
      box-shadow: var(--glow-primary);
    }

    .tactical-button-destructive {
      border-color: var(--accent-destructive);
      color: var(--accent-destructive);
    }

    .tactical-button-destructive:hover {
      background: rgba(255, 51, 102, 0.1);
      box-shadow: var(--glow-destructive);
    }

    .tactical-input {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--fg-primary);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 16px;
      width: 100%;
      outline: none;
      transition: all 0.15s ease;
    }

    .tactical-input::placeholder {
      color: var(--fg-muted);
    }

    .tactical-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px rgba(0, 255, 136, 0.2);
    }

    .entry-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .entry-card:hover {
      background: rgba(0, 255, 136, 0.05);
      border-color: var(--accent-primary);
    }

    .entry-card::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 6px;
      height: 6px;
      background: var(--fg-muted);
      transition: background 0.15s ease;
    }

    .entry-card:hover::before {
      background: var(--accent-primary);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: relative;
    }

    .status-indicator.locked {
      background: var(--accent-warning);
      box-shadow: 0 0 10px var(--accent-warning);
    }

    .status-indicator.unlocked {
      background: var(--accent-success);
      box-shadow: 0 0 10px var(--accent-success);
    }

    .status-indicator::after {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid currentColor;
      border-radius: 50%;
      opacity: 0.3;
    }

    .hud-header {
      background: linear-gradient(180deg, var(--bg-elevated) 0%, var(--bg-card) 100%);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hud-title {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .scrollbar-tactical::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar-tactical::-webkit-scrollbar-track {
      background: var(--bg-void);
    }

    .scrollbar-tactical::-webkit-scrollbar-thumb {
      background: var(--fg-muted);
      border-radius: 3px;
    }

    .scrollbar-tactical::-webkit-scrollbar-thumb:hover {
      background: var(--accent-primary);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: 0 0 5px currentColor;
      }
      50% {
        box-shadow: 0 0 15px currentColor, 0 0 25px currentColor;
      }
    }

    .pulse {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes scan-horizontal {
      0% {
        transform: translateY(-100%);
      }
      100% {
        transform: translateY(100%);
      }
    }

    .scan-line {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .scan-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      animation: scan-horizontal 3s linear infinite;
      opacity: 0.3;
    }

    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      51%, 100% {
        opacity: 0;
      }
    }

    .cursor-blink::after {
      content: '_';
      animation: blink 1s step-end infinite;
    }

    .text-success {
      color: var(--accent-success);
      text-shadow: 0 0 8px var(--accent-success);
    }

    .text-warning {
      color: var(--accent-warning);
      text-shadow: 0 0 8px var(--accent-warning);
    }

    .text-secondary {
      color: var(--accent-secondary);
    }

    .text-muted {
      color: var(--fg-muted);
    }

    .text-primary {
      color: var(--fg-primary);
    }

    .flex {
      display: flex;
    }

    .flex-col {
      flex-direction: column;
    }

    .flex-1 {
      flex: 1;
    }

    .flex-col {
      flex-direction: column;
    }

    .items-center {
      align-items: center;
    }

    .justify-center {
      justify-content: center;
    }

    .justify-between {
      justify-content: space-between;
    }

    .gap-2 {
      gap: 8px;
    }

    .gap-3 {
      gap: 12px;
    }

    .gap-4 {
      gap: 16px;
    }

    .p-3 {

    }

    .p-4 {
      padding: 16px;
    }

    .p-6 {
      padding: 24px;
    }

    .p-8 {
      padding: 32px;
    }

    .py-3 {
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .px-4 {
      padding-left: 16px;
      padding-right: 16px;
    }

    .mb-2 {
      margin-bottom: 8px;
    }

    .mb-3 {
      margin-bottom: 12px;
    }

    .mb-6 {
      margin-bottom: 24px;
    }

    .space-y-2 > * + * {
      margin-top: 8px;
    }

    .w-full {
      width: 100%;
    }

    .max-w-xs {
      max-width: 240px;
    }

    .text-center {
      text-align: center;
    }

    .text-xs {
      font-size: 11px;
    }

    .text-sm {
      font-size: 13px;
    }

    .h-1 {
      height: 4px;
    }

    .h-full {
      height: 100%;
    }

    .w-16 {
      width: 64px;
    }

    .h-16 {
      height: 64px;
    }

    .w-4 {
      width: 16px;
    }

    .h-4 {
      height: 16px;
    }

    .w-5 {
      width: 20px;
    }

    .h-5 {
      height: 20px;
    }

    .w-3\.5 {
      width: 14px;
    }

    .h-3\.5 {
      height: 14px;
    }

    .w-6 {
      width: 24px;
    }

    .h-6 {
      height: 24px;
    }

    .overflow-y-auto {
      overflow-y: auto;
    }

    .overflow-hidden {
      overflow: hidden;
    }

    .border-subtle {
      border-color: var(--border-subtle);
    }

    .border-success {
      border-color: var(--accent-success);
    }

    .border-t {
      border-top: 1px solid var(--border-subtle);
    }

    .border-b {
      border-bottom: 1px solid var(--border-subtle);
    }

    .relative {
      position: relative;
    }

    .absolute {
      position: absolute;
    }

    .bg-elevated {
      background: var(--bg-elevated);
    }

    .hover\:text-success:hover {
      color: var(--accent-success);
    }

    .hover\:text-destructive:hover {
      color: var(--accent-destructive);
    }

    .hover\:text-primary:hover {
      color: var(--fg-primary);
    }

    .hover\:text-secondary:hover {
      color: var(--fg-secondary);
    }

    .transition-colors {
      transition: color 0.15s ease;
    }

    .min-w-0 {
      min-width: 0;
    }

    .flex-shrink-0 {
      flex-shrink: 0;
    }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .font-medium {
      font-weight: 500;
    }

    .pointer-events-none {
      pointer-events: none;
    }

    .disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .preview-label {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--bg-card);
      padding: 4px 8px;
      border: 1px solid var(--border-subtle);
      font-size: 10px;
      color: var(--accent-secondary);
      letter-spacing: 0.1em;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s ease;
    }

    .icon-btn:hover {
      color: var(--accent-primary);
    }
  </style>
</head>
