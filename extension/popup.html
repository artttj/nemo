<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemo Vault</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="app">
        <!-- SCREEN 1: LOCKED -->
        <div id="locked-screen" class="screen locked-screen">
            <div class="locked-header">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <rect x="5" y="8" width="14" height="11" rx="2"/>
                        <path d="M8 8V6a4 4 0 018 0v2"/>
                    </svg>
                </div>
                <span class="logo-name">Nemo</span>
            </div>

            <div class="locked-content">
                <h1 class="locked-title">Unlock your vault</h1>
                <p class="locked-meta" id="vault-meta">Loading...</p>

                <div class="locked-actions">
                    <button class="btn btn-primary" id="unlock-btn" data-action="unlock" aria-label="Unlock vault">
                        <span class="btn-text">Unlock vault</span>
                        <span class="btn-loader" hidden></span>
                    </button>
                    <button class="btn btn-link" id="master-password-link" aria-label="Use master password to unlock">Use master password</button>
                </div>

                <p class="locked-trust">Your data is encrypted locally. We can't see your passwords.</p>
            </div>

            <div class="locked-recovery">
                <p class="recovery-label">Can't access your vault?</p>
                <button class="btn btn-ghost" data-action="recover">Restore with recovery phrase</button>
            </div>
        </div>

        <!-- SCREEN 2: VAULT LIST -->
        <div id="vault-screen" class="screen vault-screen">
            <header class="header">
                <div class="logo-block">
                    <div class="logo">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                            <rect x="5" y="8" width="14" height="11" rx="2"/>
                            <path d="M8 8V6a4 4 0 018 0v2"/>
                        </svg>
                    </div>
                    <span class="logo-text">Nemo</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" data-action="sync" title="Sync">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                            <path d="M21 12a9 9 0 11-9-9"/>
                            <path d="M21 3v6h-6"/>
                            <path d="M3 12a9 9 0 019 9"/>
                            <path d="M3 21v-6h6"/>
                        </svg>
                    </button>
                    <button class="icon-btn" data-action="lock" title="Lock">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                            <path d="M12 2v20"/>
                            <path d="M2 12h20"/>
                        </svg>
                    </button>
                </div>
            </header>

            <section class="search-section">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" class="search-input" placeholder="Search credentials..." data-input="search">
                </div>
            </section>

            <section class="filters-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="logins">Logins</button>
                <button class="filter-btn" data-filter="cards">Cards</button>
                <button class="filter-btn" data-filter="notes">Notes</button>
            </section>

            <section class="list-section">
                <div class="vault-list" data-list="credentials">
                    <div class="empty-state">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <p class="empty-text">No credentials yet</p>
                    </div>
                </div>
            </section>

            <footer class="footer">
                <button class="btn-footer" data-action="add">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <path d="M12 5v14"/>
                        <path d="M5 12h14"/>
                    </svg>
                    New credential
                </button>
            </footer>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
